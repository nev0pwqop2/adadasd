kind = "web"
previewPath = "/"
title = "Exe Joiner"
version = "1.0.0"
id = "artifacts/exe-joiner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24521

[services.development]
run = "pnpm --filter @workspace/exe-joiner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exe-joiner", "run", "build" ]
publicDir = "artifacts/exe-joiner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24521"
BASE_PATH = "/"
