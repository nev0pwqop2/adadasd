openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Exe Joiner API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: slots
    description: Slot management
  - name: payments
    description: Payment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/discord:
    get:
      operationId: discordLogin
      tags: [auth]
      summary: Initiate Discord OAuth2
      description: Redirects user to Discord OAuth2 login
      responses:
        "302":
          description: Redirect to Discord

  /auth/discord/callback:
    get:
      operationId: discordCallback
      tags: [auth]
      summary: Discord OAuth2 callback
      description: Handles Discord OAuth2 callback and creates session
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to dashboard or error page

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      description: Returns the currently authenticated user
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      description: Logs out the current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /slots:
    get:
      operationId: getSlots
      tags: [slots]
      summary: Get user slots
      description: Returns all 6 slots for the authenticated user
      responses:
        "200":
          description: User slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/create-stripe-session:
    post:
      operationId: createStripeSession
      tags: [payments]
      summary: Create Stripe checkout session
      description: Creates a Stripe checkout session for purchasing a slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStripeSessionRequest"
      responses:
        "200":
          description: Stripe session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSessionResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/create-crypto-session:
    post:
      operationId: createCryptoSession
      tags: [payments]
      summary: Create crypto payment session
      description: Creates a crypto payment session for purchasing a slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCryptoSessionRequest"
      responses:
        "200":
          description: Crypto session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CryptoSessionResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/stripe-webhook:
    post:
      operationId: stripeWebhook
      tags: [payments]
      summary: Stripe webhook handler
      description: Handles Stripe payment webhook events
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /payments/verify-crypto:
    post:
      operationId: verifyCryptoPayment
      tags: [payments]
      summary: Verify crypto payment
      description: Verifies a crypto payment and activates a slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCryptoRequest"
      responses:
        "200":
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Payment not found or failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: string
        discordId:
          type: string
        username:
          type: string
        avatar:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
      required:
        - id
        - discordId
        - username

    Slot:
      type: object
      properties:
        id:
          type: integer
        slotNumber:
          type: integer
        isActive:
          type: boolean
        purchasedAt:
          type: string
          nullable: true
        expiresAt:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
      required:
        - id
        - slotNumber
        - isActive

    SlotsResponse:
      type: object
      properties:
        slots:
          type: array
          items:
            $ref: "#/components/schemas/Slot"
      required:
        - slots

    CreateStripeSessionRequest:
      type: object
      properties:
        slotNumber:
          type: integer
          minimum: 1
          maximum: 6
      required:
        - slotNumber

    StripeSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
        url:
          type: string
      required:
        - sessionId
        - url

    CreateCryptoSessionRequest:
      type: object
      properties:
        slotNumber:
          type: integer
          minimum: 1
          maximum: 6
        currency:
          type: string
          enum: [BTC, ETH, LTC, USDT, USDC, SOL]
      required:
        - slotNumber
        - currency

    CryptoSessionResponse:
      type: object
      properties:
        paymentId:
          type: string
        address:
          type: string
        amount:
          type: string
        currency:
          type: string
        expiresAt:
          type: string
      required:
        - paymentId
        - address
        - amount
        - currency
        - expiresAt

    VerifyCryptoRequest:
      type: object
      properties:
        paymentId:
          type: string
      required:
        - paymentId

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
